name: nightly

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC nightly
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.'

      - name: Run pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          EXTRACTOR_USER_AGENT: "OregonCannabisDataProject/0.1 (+mark@pernotto.com)"
        run: |
          python -m etl.extract
          # transform / load / diff / publish invocations go here once implemented

      - name: Commit snapshot + artifacts
        run: |
          git config user.name "oc-data-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/snapshots/ public/ || true
          git diff --cached --quiet || git commit -m "chore(nightly): snapshot $(date -u +%F)"
          git push || true

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly pipeline failed on ${new Date().toISOString().slice(0,10)}`,
              body: `Run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["pipeline-failure"]
            })
