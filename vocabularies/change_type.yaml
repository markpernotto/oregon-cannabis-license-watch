scheme: oc_data.change_type
title: License Change Event Types
description: >
  Controlled vocabulary for the change_type column in license_changes. This
  is a project-defined vocabulary, not an authority vocabulary — changes are
  detected by diffing successive snapshots.
verified_at: 2026-04-24

terms:
  - id: NEW
    preferred_label: New
    definition: >
      A license_number appeared in the latest snapshot that was not present
      in the immediately prior snapshot. May represent a newly-issued license
      or a previously-removed license reappearing.

  - id: REMOVED
    preferred_label: Removed
    definition: >
      A license_number present in the prior snapshot is absent from the
      latest snapshot. Covers any de-activation reason (surrender, revocation,
      expiration, non-renewal) — the source does not distinguish.

  - id: FIELD_CHANGE
    preferred_label: Field Change
    definition: >
      A single field on an otherwise-continuously-present license changed
      between snapshots. field_name names the field (trade_name, tier,
      canopy_type, endorsements, county, physical_address, etc.).
      prev_value and new_value are JSONB to accommodate scalars and arrays.
